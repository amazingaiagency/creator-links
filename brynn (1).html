<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Brynn</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #14151c;
      color: #f0ece6;
      font-family: 'Cormorant Garamond', Georgia, serif;
      overflow-x: hidden;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100svh;
      min-height: 600px;
      overflow: hidden;
    }

    .hero-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.0) 0%,
        rgba(0,0,0,0.0) 20%,
        rgba(0,0,0,0.5) 55%,
        rgba(0,0,0,0.93) 100%
      );
    }

    .hero-content {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 0 24px 48px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .name {
      font-size: 56px;
      font-weight: 300;
      font-style: italic;
      letter-spacing: 0.05em;
      line-height: 1;
      color: #f0ece6;
      text-align: center;
      opacity: 0;
      transform: translateY(14px);
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    .location {
      margin-top: 7px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(240,236,230,0.55);
      text-align: center;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.35s forwards;
    }

    .bio {
      margin-top: 13px;
      font-size: 16px;
      font-style: italic;
      font-weight: 300;
      line-height: 1.65;
      color: rgba(240,236,230,0.85);
      text-align: center;
      max-width: 290px;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards;
    }

    .cta-nudge {
      margin-top: 24px;
      font-size: 15px;
      font-style: italic;
      font-weight: 300;
      color: rgba(240,236,230,0.82);
      text-align: center;
      letter-spacing: 0.01em;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.62s forwards;
    }

    .cta-nudge::after {
      content: '';
      display: block;
      width: 1px;
      height: 14px;
      background: rgba(240,236,230,0.3);
      margin: 10px auto 0;
    }

    .cta-btn {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      max-width: 340px;
      text-decoration: none;
      background: #ffffff;
      color: #14151c;
      padding: 22px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 400;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.72s forwards;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }

    .cta-btn:active {
      background: rgba(255,255,255,0.82);
    }

    .cta-sub {
      margin-top: 12px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.13em;
      text-transform: uppercase;
      color: rgba(240,236,230,0.7);
      text-align: center;
      opacity: 0;
      animation: rise 1s cubic-bezier(0.16,1,0.3,1) 0.85s forwards;
    }

    .insta {
      margin-top: 18px;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.15em;
      color: rgba(240,236,230,0.35);
      text-align: center;
      opacity: 0;
      animation: rise 1s ease 1s forwards;
    }

    .ai-disclosure {
      margin-top: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(240,236,230,0.3);
      text-align: center;
      opacity: 0;
      animation: rise 1s ease 1.1s forwards;
    }

    @keyframes rise {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="hero">
  <img 
    class="hero-img" 
    src="https://raw.githubusercontent.com/amazingaiagency/creator-links/main/brynn2.png" 
    alt="Brynn" 
  />
</div>
  <div class="hero-overlay"></div>

    <div class="hero-content">
      <div class="name">Brynn</div>
      <div class="location">Delta Flight Attendant &nbsp;·&nbsp; Charlotte, NC</div>
      <p class="bio">never in charlotte long enough to water my own plants.<br>he was asleep when i landed →</p>

      <div class="cta-nudge">i post things here i don't put anywhere else</div>

      <a href="https://t.me/+BVt1yxeMJlEwZTkx" class="cta-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221l-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.833.941z"/>
        </svg>
        come closer
      </a>

      <div class="cta-sub">free to join &nbsp;·&nbsp; updated every day</div>

      <div class="insta">@ on instagram</div>
    </div>
  </div>

</body>
</html>
